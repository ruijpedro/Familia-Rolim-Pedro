name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Reset npm
        run: |
          npm install -g npm@10.9.2
          rm -rf node_modules package-lock.json
          npm cache clean --force

      - name: Install dependencies
        run: npm install --no-audit --no-fund --legacy-peer-deps --no-package-lock

      - name: Build WebApp
        run: npx vite build

      - name: Add Android platform if missing
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi

      - name: Sync Android
        run: npx cap sync android

      - name: Restore custom Android icon and manifest
        run: |
          echo "A repor ícone e AndroidManifest personalizados..."
          cp -f src/main/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          mkdir -p android/app/src/main/res
          cp -R src/main/res/* android/app/src/main/res/
          ls -R android/app/src/main/res/mipmap-xxxhdpi

      - name: Build APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Familia-Rolim-Pedro-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
