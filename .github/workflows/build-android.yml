name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: |
          rm -rf node_modules
          npm install --no-audit --no-fund --legacy-peer-deps

      - name: Build WebApp
        run: npm run build

      - name: Add Android platform if missing
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Force app icon and manifest
        run: |
          mkdir -p android/app/src/main/res
          cp -R src/main/res/* android/app/src/main/res/
          cp src/main/AndroidManifest.xml android/app/src/main/AndroidManifest.xml

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Familia-Rolim-Pedro-APK
          path: android/app/build/outputs/apk/debug/*.apk
